<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="nix-agent: composable NixOS and Home Manager operations for AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#161F38"/>
    </linearGradient>

    <!-- Nix snowflake gradients (from NixOS/nixos-artwork, CC-BY 4.0) -->
    <linearGradient id="nix-light">
      <stop style="stop-color:#699ad7;stop-opacity:1" offset="0"/>
      <stop offset="0.24345198" style="stop-color:#7eb1dd;stop-opacity:1"/>
      <stop style="stop-color:#7ebae4;stop-opacity:1" offset="1"/>
    </linearGradient>
    <linearGradient id="nix-dark">
      <stop style="stop-color:#415e9a;stop-opacity:1" offset="0"/>
      <stop offset="0.23168644" style="stop-color:#4a6baf;stop-opacity:1"/>
      <stop style="stop-color:#5277c3;stop-opacity:1" offset="1"/>
    </linearGradient>
    <linearGradient xlink:href="#nix-light" id="nix-light-u" gradientUnits="userSpaceOnUse" gradientTransform="translate(70.650339,-1055.1511)" x1="200.59668" y1="351.41116" x2="290.08701" y2="506.18814"/>
    <linearGradient xlink:href="#nix-dark" id="nix-dark-u" gradientUnits="userSpaceOnUse" gradientTransform="translate(864.69589,-1491.3405)" x1="-584.19934" y1="782.33563" x2="-496.29703" y2="937.71399"/>

    <!-- Nix snowflake (NixOS/nixos-artwork, CC-BY 4.0) -->
    <g id="snow-geometry" transform="translate(-156.41121,933.30685)">
      <g transform="matrix(0.99994059,0,0,0.99994059,-0.06321798,33.188377)">
        <path id="nix-l" d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8257 z" style="fill:url(#nix-light-u);fill-rule:evenodd;stroke:none"/>
        <use transform="rotate(60,407.11155,-715.78724)" xlink:href="#nix-l"/>
        <use transform="rotate(-60,407.31177,-715.70016)" xlink:href="#nix-l"/>
        <use transform="rotate(180,407.41868,-715.7565)" xlink:href="#nix-l"/>
        <path id="nix-d" d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8256 z" style="fill:url(#nix-dark-u);fill-rule:evenodd;stroke:none"/>
        <use transform="rotate(120,407.33916,-716.08356)" xlink:href="#nix-d"/>
        <use transform="rotate(-120,407.28823,-715.86995)" xlink:href="#nix-d"/>
      </g>
    </g>
    <g id="snow">
      <use xlink:href="#snow-geometry"/>
      <g fill="#cfe8fc">
        <circle cx="218.78" cy="220.78" r="16"/>
        <circle cx="282.78" cy="220.78" r="16"/>
      </g>
      <path d="M220.78 258 Q250.78 284 280.78 258" fill="none" stroke="#cfe8fc" stroke-width="9" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1280" height="320" fill="#0B1020"/>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1279" height="319" fill="none" stroke="#2A3656" stroke-opacity="0.6"/>

  <!-- faint nix-agent mark, right side -->
  <use xlink:href="#snow" transform="translate(1120,150) scale(0.78) translate(-250.781,-250.781)" opacity="0.06"/>

  <!-- mark -->
  <use xlink:href="#snow" transform="translate(152,160) scale(0.4) translate(-250.781,-250.781)"/>

  <!-- wordmark -->
  <text x="300" y="178" font-family="DejaVu Sans Mono, monospace" font-size="92" font-weight="700" letter-spacing="-1">
    <tspan fill="#E6EDF3">nix-</tspan><tspan fill="#7EBAE4">agent</tspan>
  </text>

  <!-- tagline -->
  <text x="304" y="226" font-family="DejaVu Sans, sans-serif" font-size="27" fill="#8B98B0">composable NixOS and Home Manager operations for AI agents</text>

  <!-- tool chips -->
  <text x="304" y="272" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#5C6F9E" letter-spacing="0.2">build · diff · switch · generations · eval_config · locate_option · check</text>
</svg>
